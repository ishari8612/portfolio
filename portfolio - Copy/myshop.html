<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Online Store</h1>

     <img src="images/myshop.jpg" width="300" onclick="openImage(this.src)">

    <p>
        An online store that allows users to browse products,
        add items to cart, and place orders.
    </p>

    <h3>Technologies Used:</h3>
    <ul>
        <li>PHP</li>
        <li>HTML</li>
        <li>CSS</li>
        <li>SQL</li>
    </ul>

    <a href="index.html">← Back to Home</a>
</div>
 <div id="imageModal" onclick="closeImage()" 
         style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; text-align:center;">
        
        <img id="modalImg" style="max-width:90%; max-height:90%; margin-top:5%;">
    </div>

    <!-- JavaScript -->
    <script>
        function openImage(src){
            document.getElementById("imageModal").style.display = "block";
            document.getElementById("modalImg").src = src;
        }

        function closeImage(){
            document.getElementById("imageModal").style.display = "none";
        }
    </script>

</body>
</html>
